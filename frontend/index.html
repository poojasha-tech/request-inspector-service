<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }

        h1 {
            color: #333;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }

        #endpointUrl {
            font-weight: bold;
            color: #007BFF;
        }

        #requests {
            margin-top: 20px;
            border: 1px solid #ccc;
            padding: 10px;
            max-height: 300px;
            overflow-y: auto;
        }

        .request {
            border-bottom: 1px solid #eee;
            padding: 10px 0;
        }
    </style>
</head>

<body>
    <h1>Live Endpoint Dashboard</h1>
    <button id="newEndpoint">Create new Endpoint</button>
    <p>Your Endpoint URL : <span id="endpointUrl"> Not created yet</span></p>

    <h2>Your Live Request</h2>
    <div id="requests"></div>


    <script src="dashboard.js"></script>
</body>

</html>
